name: CI

# 触发方式：
#   1) push 到 main（本地提交直接进 CI）
#   2) pull_request 任意分支 → main
#   3) 手动 workflow_dispatch（本地复跑）
#
# 作用：在每个 PR / 推送里对 3 个目标平台都做一次构建，提前暴露
#       Windows / macOS aarch64 / macOS x64 任一端的编译错误与 cfg 守卫问题。
#       仅构建、不发布、不打 tag 也不写 Release。
on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 不需要写权限——本 workflow 只 build + 上传 SARIF 等构建产物（若有）。
permissions:
  contents: read

# 同一分支 / 同一 PR 上有新的 push 时自动取消旧的，避免资源浪费。
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build (${{ matrix.label }})
    strategy:
      # 任一平台失败立刻停（fail-fast: true 是默认行为，显式写出便于后人读懂）。
      # macOS 两个 target 在同一台 macOS runner 上先后跑、互不阻塞。
      fail-fast: true
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macos-aarch64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macos-x64
          - platform: windows-latest
            target: ""            # windows-latest 默认 target，不强制交叉
            label: windows-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target && matrix.target || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm install

      - name: Encrypt persona assets
        run: npm run encrypt-assets

      - name: Strip plaintext persona assets
        run: node scripts/bundle-assets.mjs strip

      # 注意：不再调用 tauri-action 的 release 路径（无 tagName / releaseName），
      # 只做 build 校验。
      - name: Build (Tauri)
        uses: tauri-apps/tauri-action@v0
        with:
          # 显式给 args；target 来自 matrix，bundle 类型走仓库 tauri.conf.json 默认
          # （既包含 dmg 也包含 nsis；该 workflow 实际产什么 bundle 由 OS 决定，跨
          # OS target 安装器可能不齐全，但只要 cargo / tauri build 跑通即视为通过）。
          args: ${{ matrix.target && format('--target {0}', matrix.target) || '' }}

      - name: Restore plaintext persona assets
        if: always()
        run: node scripts/bundle-assets.mjs restore
