name: Release

# 触发方式：
#   1) 推送形如 v0.2.0 的 tag（主路径，自动建 Release 并上传产物）
#   2) 手动 workflow_dispatch（用于重跑，会以当前分支名建 Release）
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS：分别产出 Apple Silicon 与 Intel 两个 dmg
          - platform: macos-latest
            args: "--target aarch64-apple-darwin --bundles dmg"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin --bundles dmg"
          # Windows：NSIS 安装包
          - platform: windows-latest
            args: "--bundles nsis"

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ contains(matrix.platform, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm install

      - name: Encrypt persona assets
        run: npm run encrypt-assets

      - name: Strip plaintext persona assets
        run: node scripts/bundle-assets.mjs strip

      - name: Build & Release (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "元元桌宠 ${{ github.ref_name }}"
          releaseBody: |
            元元桌宠（Tauri 版）安装包。

            ### 安装包

            - **Windows**：`.exe`（NSIS，需 WebView2；Win10/11 一般已内置）。安装时可勾选配置 GPU 本地语音模型（IndexTTS-2 / CosyVoice3）。
            - **macOS**：`.dmg`（Apple Silicon 选 `aarch64`，Intel 选 `x64`）；菜单栏托盘应用，不占用 Dock。

            ### v0.2.11

            - 本地语音：启动后台预热语音识别（Whisper），首次实时通话不再因冷加载而「点了没反应」
            - 本地语音：自动补全 ffmpeg 路径（从访达 / 托盘启动缺 Homebrew PATH 时也能找到）
            - 本地语音：端口被占但服务不健康时，自动清理残留进程后重启，避免卡在「正在启动」
            - 本地语音：参考音频缺少对应文案时给出明确提示，避免克隆音色开头串音
            - macOS：菜单栏托盘图标更快出现；开发模式保留 Dock 入口；右键桌宠在光标处弹出菜单
            - 通话：优化麦克风获取时机与权限提示；自动朗读改用更稳的解码播放，修复长语音后半段被截断

            ### v0.2.10

            - 修复 Windows 安装脚本 `setup-qwen3-tts.ps1` 校验步骤误报 SyntaxError

            ### v0.2.9

            - 兜底参考音改用 15s 版本并移除 30s

            ### v0.2.8

            - 本地 Qwen3-TTS 跨平台化：Windows / Linux 改走官方 PyTorch 包 `qwen-tts`

            ### v0.2.7

            - 文字与语音同步出现：开启朗读时，每句在其语音开始播放的瞬间才显示，长回复逐句同步
            - 追问（followup）第二句改为在第一句「文字+语音」出现完成后再出现，避免两行光标同时空等
            - Windows：隐藏本地语音服务及 ffmpeg 转码的 cmd 黑窗
            - 修复本地 CosyVoice3 参考音频保存后不生效（补齐 `local_ref_wav` 持久化字段）

            ### v0.2.6

            - 修复本地语音播报期间误打断，以及后半句丢失

            ### v0.2.5

            - 修复表情包面板打开时报错（补全 `stickerGridBuilt` 声明）

            ### v0.2.4

            - 多语音后端：火山引擎、本地 Qwen3-TTS、CosyVoice（通义云）、IndexTTS-2 / CosyVoice3（Windows + NVIDIA）
            - 朗读与实时通话共用后端；本地模型零样本克隆参考音频
            - AI 语音播放音量 0–200%

            > macOS 未做代码签名/公证，首次打开若提示「已损坏 / 无法验证开发者」，请在「访达」中右键「打开」，或终端执行：`xattr -cr /Applications/元元桌宠.app`
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Restore plaintext persona assets
        if: always()
        run: node scripts/bundle-assets.mjs restore
