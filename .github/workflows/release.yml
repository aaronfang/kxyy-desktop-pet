name: Release

# 触发方式：
#   1) 推送形如 v0.2.0 的 tag（主路径）—— 仅自动构建 Windows，省额度
#   2) 手动 workflow_dispatch —— 可勾选 include_macos 追加构建 macOS（.dmg）
#
# 为什么这么设计：私有仓库 Actions 计费倍率 macOS ×10、Windows ×2、Linux ×1，
# macOS 占了单次发版约九成的额度。故日常推 tag 只出 Windows；需要 macOS 版时，
# 在 Actions 页面对该 tag 手动 Run workflow 并勾选 include_macos 即可（会追加 dmg
# 到同一个 Release）。
#
# 流程：verify（校验四处版本号与 tag 一致）→ setup-matrix（按触发方式决定构建平台）
# → release（按矩阵并行构建 + 自动从 git log 生成 changelog + 上传到 GitHub Release）。
#
# 成本保险：GitHub 账号 Settings → Billing → Budgets 已对 Actions 设置 $0 预算
# 且 Stop usage=Yes。免费额度（2000 min/月）用尽后会被硬性拦截，永不产生超额计费。
on:
  workflow_dispatch:
    inputs:
      include_macos:
        description: "同时构建 macOS (.dmg)？会额外消耗约 10x 的 Actions 额度"
        type: boolean
        default: false
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # 第一关：版本号一致性校验。任何一处不一致都让整个 release 失败。
  # 解决"bump 完忘打 tag"与"打 tag 前忘 bump"两种旧坑。
  verify:
    name: Verify tag version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check tag ↔ package.json ↔ tauri.conf.json ↔ Cargo.toml
        run: |
          TAG="${{ github.ref_name }}"
          TAG_VER="${TAG#v}"
          PKG_VER=$(node -p "require('./package.json').version")
          TAURI_VER=$(node -p "require('./src-tauri/tauri.conf.json').version")
          CARGO_VER=$(grep '^version' src-tauri/Cargo.toml | head -n1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "tag=$TAG_VER  package.json=$PKG_VER  tauri.conf.json=$TAURI_VER  Cargo.toml=$CARGO_VER"
          if [ "$TAG_VER" != "$PKG_VER" ] || [ "$TAG_VER" != "$TAURI_VER" ] || [ "$TAG_VER" != "$CARGO_VER" ]; then
            echo "::error::tag 与三处版本号必须完全一致；请先 bump 再打 tag"
            exit 1
          fi

  # 第二关：决定构建矩阵。默认（推 tag）只构建 Windows；仅当手动触发且勾选
  # include_macos 时才追加两个 macOS 目标（省下 ×10 的 macOS 额度）。
  setup-matrix:
    needs: verify
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - name: Compute build matrix
        id: set
        run: |
          WIN='{"platform":"windows-latest","args":"--bundles nsis"}'
          MAC_ARM='{"platform":"macos-latest","args":"--target aarch64-apple-darwin --bundles dmg"}'
          MAC_X64='{"platform":"macos-latest","args":"--target x86_64-apple-darwin --bundles dmg"}'
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.include_macos }}" = "true" ]; then
            echo "matrix={\"include\":[$WIN,$MAC_ARM,$MAC_X64]}" >> "$GITHUB_OUTPUT"
            echo "构建平台：Windows + macOS(aarch64/x64)"
          else
            echo "matrix={\"include\":[$WIN]}" >> "$GITHUB_OUTPUT"
            echo "构建平台：仅 Windows（如需 macOS 请手动触发并勾选 include_macos）"
          fi

  # 第三关：构建并发布。changelog 在这一步自动从 git log 生成，
  # 彻底消除"忘改 release.yml"的可能。
  release:
    needs: [verify, setup-matrix]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup-matrix.outputs.matrix) }}
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout (full history for changelog)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 需要完整 tag 历史以生成 changelog

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ contains(matrix.platform, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm install

      # 从上一个 tag 到本 tag 的 commit，按 conventional commit 类型分桶
      # 自动归类：feat* → 新增，fix* → 修复，其余（跳过 chore(release)/docs/ci/build）→ 其他
      # merge commits 用 --no-merges 排除
      - name: Generate release notes
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -n1 || true)
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
            COMPARE_URL="https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}"
          else
            RANGE="HEAD"
            COMPARE_URL=""
          fi

          FEAT=$(git log --no-merges --pretty=format:"%s" "$RANGE" \
                 | grep -E "^(feat|✨)" \
                 | sed -E 's/^(feat|✨)(\([^)]+\))?!?:\s*/- /' || true)
          FIX=$(git log --no-merges --pretty=format:"%s" "$RANGE" \
                | grep -E "^(fix|🐛)" \
                | sed -E 's/^(fix|🐛)(\([^)]+\))?!?:\s*/- /' || true)
          OTHER=$(git log --no-merges --pretty=format:"%s" "$RANGE" \
                  | grep -vE "^(feat|fix|✨|🐛|chore\(release\)|docs|ci|build)" \
                  | sed 's/^/- /' || true)

          cat > release_notes.md <<EOF
          元元桌宠（Tauri 版）安装包。

          ### 安装包

          - **Windows**：\`.exe\`（NSIS，需 WebView2；Win10/11 一般已内置）。安装时可勾选配置 GPU 本地语音模型（IndexTTS-2 / CosyVoice3）。
          - **macOS**：\`.dmg\`（Apple Silicon 选 \`aarch64\`，Intel 选 \`x64\`）；菜单栏托盘应用，不占用 Dock。

          ## ${TAG} 更新内容

          EOF

          if [ -n "$FEAT" ]; then
            printf "### 新增\n\n%s\n\n" "$FEAT" >> release_notes.md
          fi
          if [ -n "$FIX" ]; then
            printf "### 修复\n\n%s\n\n" "$FIX" >> release_notes.md
          fi
          if [ -n "$OTHER" ]; then
            printf "### 其他\n\n%s\n\n" "$OTHER" >> release_notes.md
          fi
          if [ -n "$COMPARE_URL" ]; then
            printf "[变更对比 %s → %s](%s)\n\n" "$PREV_TAG" "$TAG" "$COMPARE_URL" >> release_notes.md
          fi
          printf '> macOS 未做代码签名/公证，首次打开若提示「已损坏 / 无法验证开发者」，请在「访达」中右键「打开」，或终端执行：`xattr -cr /Applications/元元桌宠.app`\n' >> release_notes.md

          echo "===== release_notes.md ====="
          cat release_notes.md

      - name: Encrypt persona assets
        run: npm run encrypt-assets

      - name: Strip plaintext persona assets
        run: node scripts/bundle-assets.mjs strip

      - name: Build & Release (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "元元桌宠 ${{ github.ref_name }}"
          releaseBodyFile: release_notes.md
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Restore plaintext persona assets
        if: always()
        run: node scripts/bundle-assets.mjs restore
