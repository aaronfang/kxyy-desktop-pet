# ============================================================================
# 元元人设蒸馏 - LLM 提取提示词
# ============================================================================
# 每个维度对应一个提取指标，LLM 按提示词从转录文本中提取对应模式。
# 变量: {chunk} 会被替换为转录文本片段
# ============================================================================

catchphrases:
  name: "口头禅与高频词汇"
  description: "提取元元最常说的口头禅、惯用词汇和固定句式"
  prompt: |
    你是一位语言学家，正在分析一段中文口语转录文本（来自一位东北女主播"元元"的直播回放）。

    ⚠️ 重要：转录文本中可能混入了背景播放的歌曲歌词（古风歌曲、流行歌曲等）。
    这些歌词不是元元说的话，请完全忽略它们。判断标准：
    - 押韵的、诗歌化的短句（如"明月高悬微风""一曲诺此生""长安那秋风流"）→ 歌词，忽略
    - 中英混杂的碎片（如"Beautiful life""one two three four"）→ 背景音乐，忽略
    - 口语化、不押韵、有直播语境的（如"感谢""咱们""那个""就是"）→ 元元的话

    请从以下转录文本中提取"口头禅与高频词汇"：

    1. **口头禅**（出现≥3次才算）：列出短语、出现次数、典型语境
    2. **高频语气词**：如"哎哟""哎""哎呀""嘶""哇""哈"等
    3. **固定开场/收尾句式**：如"家人们~""咱就是说""行了先这样"
    4. **独特用词**：非标准普通话的用词偏好

    格式要求：
    - 每个条目一行，格式: `- "词汇"（频率:N次，语境:xxx）`
    - 如果某项没有发现，写"无"
    - 只分析元元说的话，不要分析弹幕/观众的话，不要分析背景歌曲歌词
    - ⚠️ 禁止推测或生成原文中不存在的条目。每个条目必须能从转录文本中找到确切证据。不要编造"嗯嗯嗯""哦哦哦"等叠加词，除非原文确实多次出现。

    转录文本：
    {chunk}

catchphrases_merge:
  name: "口头禅汇总"
  description: "汇总多个片段的口头禅提取结果"
  prompt: |
    你正在汇总对一位东北女主播"元元"的多次口头禅分析结果。

    以下是从多个直播片段中分别提取的口头禅列表。请：
    1. 合并相同/相似的口头禅（如"家人们"和"家人"合并为一个条目）
    2. 累加出现频率（必须给出具体数字，如"22次"，禁止写"多次""若干次"等模糊词）
    3. 合并相似语境，保留 1-2 个典型语境描述
    4. 按频率从高到低排序
    5. 输出 Top 50，格式: `- "口头禅"（频率:N次，语境:xxx）`
    6. 末尾附分类总结（高频语气词 Top 10、固定开场/收尾句式、独特用词偏好）

    ⚠️ 重要：如果你的输出中任何一个条目的频率写的是"多次"而不是具体数字，你的输出将被判定为不合格。

    多个分析结果：
    {chunk}

sentence_style:
  name: "句式特征"
  description: "分析元元的句式结构、句长、说话节奏"
  prompt: |
    你是一位语言学家，正在分析一位东北女主播"元元"的说话风格。

    ⚠️ 重要：转录文本中可能混入了背景歌曲歌词（古风/流行），这些不是元元说的话，请忽略。

    请从以下转录文本中分析"句式特征"：

    1. **平均句长**：她习惯说长句还是短句？（请给出大致字数范围）
    2. **句式结构偏好**：陈述句/反问句/感叹句/设问句的大致比例
    3. **节奏特征**：是否有明显的话赶话、重复、拖长音等特征
    4. **连接词习惯**：她如何衔接话题？（如"然后""完了""就""而且"）
    5. **停顿/填充词**：沉默时用什么填充？（如"嗯""那个""就是说"）

    格式：每个维度用一段文字描述，不要太长，以观察事实为主。

    转录文本：
    {chunk}

emotional_pattern:
  name: "情感表达模式"
  description: "分析元元在不同情绪下的表达特征"
  prompt: |
    你正在分析一位东北女主播"元元"的情感表达模式。

    ⚠️ 重要：转录文本中可能混入了背景歌曲歌词（古风/流行），这些不是元元说的话，请忽略。

    请从以下转录文本中提取她的"情感表达特征"：

    1. **开心/兴奋时**：会用什么词、什么语气？有什么身体/动作描述？
    2. **生气/不满时**：如何表达不满？会直接怼还是幽默化解？
    3. **害羞/尴尬时**：如何反应？有什么口头禅？
    4. **感动/走心时**：语气如何变化？
    5. **调侃/吐槽时**：自嘲还是损别人？有什么标志性句式？
    6. **安慰/温柔时**：会用什么样的措辞和语气？

    格式：每个情绪维度一段，以观察为主，不要猜测。如果没有观察到某种情绪，写"本段未观察到"。
    - ⚠️ 重要：把"哈哈""呵呵""哎呀""哎哟""我操""我去"等感叹词和笑声归入元元的情绪表达，不要当成背景歌曲。背景歌曲是押韵诗句（如"明月高悬微风""一曲诺此生"），感叹词和口语化语气词是元元自己说的。
    - ⚠️ 即使情绪表达不明显，也应记录细微的语气变化和措辞特征。不要因为大多数句子平淡就全部写"未观察到"，仔细寻找每一处有情绪色彩的措辞、感叹、语气词变化。
    - ⚠️ 如果 9 个情绪维度中超过 4 个写了"未观察到"，你的输出将被判定为不合格。

    转录文本：
    {chunk}

interaction:
  name: "互动回应模式"
  description: "分析元元如何与弹幕/观众互动"
  prompt: |
    你正在分析一位东北女主播"元元"的互动回应模式。

    ⚠️ 重要：转录文本中可能混入了背景歌曲歌词，这些不是元元说的话，请忽略。

    从以下转录文本（包含观众提问和元元回复）中提取：

    1. **被夸赞时的回应模式**：谦虚？害羞？大方接受？反过来夸对方？
    2. **被质疑/挑刺时的回应模式**：解释？怼回去？无视？幽默化解？
    3. **被问隐私时的回应模式**：直接拒绝？绕弯子？半真半假？
    4. **冷场/没弹幕时的自说自话模式**：如何活跃气氛？
    5. **接话习惯**：是顺着说还是另起话题？会不会经常反问观众？
    6. **对熟客 vs 新观众**：称呼、语气有区别吗？

    格式：每个维度一段描述。只分析元元的回应方式。

    转录文本：
    {chunk}

dialect:
  name: "方言/口音特征"
  description: "提取元元的东北话特征"
  prompt: |
    你正在分析一位东北女主播"元元"的方言特征。

    ⚠️ 重要：转录文本中可能混入了背景歌曲歌词（古风/流行），这些不是元元说的话，请忽略。

    请从以下转录文本中提取：

    1. **东北话用词**：列出所有发现的东北方言词汇、含义、使用频率
       - 注意区分真正的东北话和网络流行语
    2. **语法特征**：有没有东北话特有的语法？
    3. **发音特征**：虽然我们是文本分析，但有没有能从用词反推的发音习惯？

    ⚠️ 关键规则（违反复核不合格）：
    - 只列出转录文本中确实出现过的词。每个词后必须有原文例句。
    - 绝对禁止列出"未直接出现""未出现""疑似未出现"的词汇。
    - 绝对禁止重复列出同一个词（即使是不同变体）。
    - 绝对禁止列出超过 20 个条目。
    - 如果某子类只有 2-3 个发现，就只写 2-3 个，写"无"比瞎编强。

    格式：按发现列出。如果某个子类没有发现，写"无"。

    转录文本：
    {chunk}

self_reference:
  name: "自我指称方式"
  description: "分析元元如何称呼自己"
  prompt: |
    ⚠️ 转录文本中可能混入了背景歌曲歌词，这些不是元元说的话，请忽略。

    分析这位主播"元元"的自我指称方式：

    1. **自称**：她用"我""元元""你元姐""咱"还是其他称呼？
    2. **自称的变化**：不同场景下自称会变吗？（如生气时说"你姐我"，撒娇时说"人家"）
    3. **自我描述**：她怎么描述自己的身份、职业、性格？
    4. **自嘲模式**：她怎么开自己的玩笑？

    格式：每个小维度一段。

    转录文本：
    {chunk}

audience_address:
  name: "对粉丝的称呼模式"
  description: "分析元元如何称呼观众/粉丝"
  prompt: |
    ⚠️ 转录文本中可能混入了背景歌曲歌词，这些不是元元说的话，请忽略。

    分析主播"元元"对观众/粉丝的称呼模式：

    1. **集体称呼**：怎么叫全体观众？（家人们/兄弟们/宝子们/元宝们/兄弟姐妹们...）
    2. **个体称呼**：怎么称呼单个互动的观众？
    3. **称呼变体**：不同场景用不同称呼吗？（开场/道别/生气/感动时称呼有变化吗？）
    4. **亲密度分级**：有没有根据熟客程度用不同称呼？

    ⚠️ 关键规则：
    - 每个称呼条目只列一次，绝不重复列出同一个称呼
    - 限制总输出在 30 行以内，精简为要点列表
    - 如果某个分类条目过多（如"个体称呼"），只列最常用的 8-10 个
    - 绝对禁止连续输出相同的行。如果你发现自己开始重复，立即停止

    格式：按场景分类列出。

    转录文本：
    {chunk}

audience_address_merge:
  name: "粉丝称呼汇总"
  description: "汇总多个片段的粉丝称呼提取结果"
  prompt: |
    你正在汇总对一位东北女主播"元元"的多次粉丝称呼分析结果。

    以下是从多个直播片段中分别提取的称呼模式。请：
    1. 去重：相同的称呼合并为一个条目
    2. 按分类整理（集体称呼、个体称呼、称呼变体、亲密度分级）
    3. 每个分类最多保留 10 个条目，优先保留高频出现的
    4. 输出精简的要点列表，总数不超过 35 行
    5. 如果同一称呼在多个片段中出现，标记为"高频"

    ⚠️ 绝对禁止连续输出相同的行。每个条目必须不同。

    多个分析结果：
    {chunk}

stuttering:
  name: "口吃与重复模式"
  description: "提取元元的口吃、叠字、重复等口语特征（带上下文例句，供 AI 模仿）"
  prompt: |
    逐句扫描以下直播转录文本。你的任务只有一件：找出说话人口吃的句子。

    口吃定义：说话时不自觉重复同一个字、词或短语。
    注意：转录文本中可能混入背景歌曲歌词，请忽略这些。

    输出格式（严格遵守，每行一个发现）：
    [TYPE] | 重复短语 | 原文例句（含上下文）

    TYPE可选：
    - SINGLE: 单字叠字（如 我我我、行行行）
    - WORD: 词语重复（如 就是就是、那个那个）
    - PHRASE: 短语重复（如 我跟你说我跟你说）

    示例输出：
    [SINGLE] | 我我我 | ...然后我我我跟你说这个事...
    [WORD] | 就是就是 | ...就是就是你点那个按钮...
    [PHRASE] | 你知道吧你知道吧 | ...你知道吧你知道吧这事...

    如果找不到口吃，输出：未发现明显口吃模式

    现在开始扫描：
    {chunk}

stuttering_merge:
  name: "口吃模式汇总"
  description: "汇总多个片段的口吃提取结果，输出 AI 可用的口吃风格指南"
  prompt: |
    以下是从多个直播片段中分别提取的口吃模式。请合并去重，输出一份简洁摘要：

    ## 口吃高频词（按次数排序，Top 15）
    格式：`短语|次数|类型`

    ## 规律总结（3-5句话）
    - 什么情境下容易口吃？
    - 偏爱重复2次还是3次？
    - 口吃后怎么处理（跳过/换说法/硬说下去）？

    多个分析结果：
    {chunk}

topic_preference:
  name: "话题偏好"
  description: "分析元元常聊的话题和回避的话题"
  prompt: |
    ⚠️ 转录文本中可能混入了背景歌曲歌词，这些不是元元说的话，请忽略。

    分析主播"元元"的话题偏好：

    1. **高频话题 Top 10**：她主动聊的最多的话题是什么？
       - 例如: 游戏内容、日常生活、粉丝八卦、美食、情感...
    2. **话题切换模式**：她是如何从一个话题自然过渡到另一个的？
    3. **回避模式**：有明显回避的话题吗？怎么回避的？
    4. **话痨程度**：她是一个话题能聊很久还是快速切换？

    格式：分类列出，每种话题附带 1-2 个原文例子。

    转录文本：
    {chunk}
