<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>元元聊天</title>
  <link rel="stylesheet" href="./chat.css" />
</head>
<body>
  <div id="chat">
    <div id="messages" aria-live="polite"></div>
    <div id="attach-preview" hidden>
      <img id="attach-thumb" alt="待发送图片" />
      <button id="attach-remove" type="button" title="移除图片">×</button>
    </div>
    <div id="sticker-preview" hidden>
      <img id="sticker-thumb" alt="待发送表情" />
      <button id="sticker-remove" type="button" title="移除表情">×</button>
    </div>
    <div id="sticker-panel" hidden>
      <div id="sticker-grid"></div>
    </div>
    <form id="composer" autocomplete="off">
      <button id="call-btn" type="button" title="实时语音通话" aria-label="实时语音通话">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.9.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      </button>
      <button id="attach" type="button" title="发图（截图可直接粘贴 Ctrl+V）" aria-label="发送图片">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.6"/><path d="M21 15l-5-5L5 21"/></svg>
      </button>
      <input id="file" type="file" accept="image/*" hidden />
      <input id="input" type="text" placeholder="和元元说点什么…（Esc 收起）" />
      <button id="stickers-btn" type="button" title="表情库" aria-label="表情库">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8 14.5s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
      </button>
      <button id="send" type="submit" title="发送">发送</button>
    </form>
    <div id="voice-debug" aria-hidden="true">
      <div id="voice-debug-label">语音 · …</div>
      <div id="persona-debug-meta"></div>
      <div id="api-debug-meta"></div>
      <div id="text-debug-gen" hidden>
        <div id="text-debug-bar" class="idle"><i></i></div>
        <span id="text-debug-meta"></span>
      </div>
      <div id="call-debug-meta"></div>
      <div id="realtime-diagnostic-actions">
        <button id="copy-realtime-diagnostic" type="button">复制通话诊断 JSON</button>
        <span id="realtime-diagnostic-status" aria-live="polite"></span>
      </div>
      <div id="voice-debug-tts">
        <div id="voice-debug-bar" class="idle"><i></i></div>
        <span id="voice-debug-tts-meta"></span>
      </div>
    </div>
    <div id="call-wave" hidden aria-hidden="true">
      <div class="call-wave-bars"></div>
    </div>
    <div id="startup-status" aria-live="polite">
      <span class="svc-dot voice pending"></span><span class="svc-label">语音</span>
      <span class="svc-dot api pending"></span><span class="svc-label">AI</span>
    </div>
  </div>
  <script type="module" src="./chat.js"></script>
</body>
</html>
