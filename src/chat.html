<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>元元聊天</title>
  <link rel="stylesheet" href="./chat.css" />
</head>
<body>
  <div id="chat">
    <div id="messages" aria-live="polite"></div>
    <div id="attach-preview" hidden>
      <img id="attach-thumb" alt="待发送图片" />
      <button id="attach-remove" type="button" title="移除图片">×</button>
    </div>
    <div id="sticker-panel" hidden>
      <div id="sticker-grid"></div>
    </div>
    <form id="composer" autocomplete="off">
      <button id="stickers-btn" type="button" title="表情库" aria-label="表情库">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8 14.5s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
      </button>
      <button id="attach" type="button" title="发图（截图可直接粘贴 Ctrl+V）" aria-label="发送图片">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.6"/><path d="M21 15l-5-5L5 21"/></svg>
      </button>
      <input id="file" type="file" accept="image/*" hidden />
      <input id="input" type="text" placeholder="和元元说点什么…（Esc 收起）" />
      <button id="send" type="submit" title="发送">发送</button>
    </form>
  </div>
  <script type="module" src="./chat.js"></script>
</body>
</html>
